services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: arcadeiq-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      SA_PASSWORD: ${ARCADEIQ_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - arcadeiq-sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${ARCADEIQ_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  arcadeiq-sqlserver-data:
